<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Export — FSAE Tech Inspection</title>
    <link rel="stylesheet" href="css/export.css" />
    <link rel="stylesheet" href="css/rich-text.css" />
  </head>
  <body>
    <div class="export-toolbar no-print">
      <button type="button" id="export-print-btn" class="export-btn">Save as PDF / Print</button>
      <a id="export-back-link" class="export-btn export-btn--secondary" href="dashboard.html">Back</a>
    </div>

    <article id="export-document" class="export-document">
      <header class="export-header">
        <h1>FSAE Technical Inspection</h1>
        <p id="export-team-line" class="export-team-line"></p>
        <p id="export-meta-line" class="export-meta-line"></p>
      </header>

      <table class="export-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Inspection</th>
            <th>Status</th>
            <th>Pass/Fail comment</th>
            <th>Inspector</th>
            <th>Date &amp; time</th>
          </tr>
        </thead>
        <tbody id="export-table-body"></tbody>
      </table>

      <footer class="export-footer">
        <p id="export-summary"></p>
      </footer>
    </article>

    <p id="export-error" class="export-error" hidden></p>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/csv-utils.js"></script>
    <script src="js/data-store.js"></script>
    <script src="js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script src="js/rich-text.js"></script>
    <script src="js/export.js"></script>
  </body>
</html>
