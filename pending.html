<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1e1b4b" />
    <title>Pending approval — FSAE Tech Inspection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <div class="app auth-page">
      <header class="app-header app-header--row">
        <h1>Tech Inspection</h1>
        <nav class="header-nav" aria-label="Account">
          <button type="button" class="header-link btn-logout" id="logout-btn">Log out</button>
        </nav>
      </header>

      <main class="auth-main">
        <div class="auth-card pending-card">
          <div class="pending-icon" id="pending-icon" aria-hidden="true">⏳</div>
          <h2 id="pending-title">Awaiting admin approval</h2>
          <p id="pending-body">
            Your access request has been submitted. An admin will review and assign your role.
            You'll be able to use the app after approval.
          </p>
          <p id="pending-detail" class="pending-detail"></p>
        </div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/csv-utils.js"></script>
    <script src="js/data-store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pending.js"></script>
  </body>
</html>
